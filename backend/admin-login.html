<!DOCTYPE html>
<html>
<head>
    <title>Admin Login — Mr Brown's</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #2c1a0a 0%, #8b6040 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            color: #2c1a0a;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #8b6040;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #2c1a0a;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #2c1a0a;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2c1a0a;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #1a0f06;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Mr Brown's</h1>
        <p class="subtitle">Admin Dashboard</p>
        <div class="error" id="error"></div>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="password">Admin Password</label>
                <input type="password" id="password" required autofocus>
            </div>
            <button type="submit" id="loginBtn">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Login</span>
            </button>
        </form>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');
            const errorDiv = document.getElementById('error');

            btn.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.textContent = 'Logging in...';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/api/admin/login', {  // relative — served from same Railway server
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }),
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = '/admin';
                } else {
                    errorDiv.textContent = 'Invalid password';
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    spinner.style.display = 'none';
                    btnText.textContent = 'Login';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Is the backend running?';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Login';
            }
        }
    </script>
</body>
</html>
